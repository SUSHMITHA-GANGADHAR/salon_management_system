{% extends "layout.html" %}
{% block title %}Login | Salon Pro{% endblock %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 80vh; padding: 20px;">
    <div class="auth-card" style="width: 100%; max-width: 450px; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); margin: 0 auto;">
        <div class="auth-header" style="text-align: center; margin-bottom: 35px;">
            <h2 style="font-family: Playfair Display, serif; font-size: 2.2rem; margin-bottom: 10px;">Welcome Back</h2>
            <p style="color: #666;">Please enter your details to sign in</p>
        </div>
        <form id="loginForm">
            <div class="form-group">
                <label for="email"><i class="fas fa-envelope"></i> Email Address</label>
                <input type="email" id="email" name="email" placeholder="john@example.com" required>
            </div>
            <div style="margin-bottom: 25px; width: 100%;">
                <label for="password" style="display: block; margin-bottom: 10px; font-weight: 500; color: #333; text-align: left;"><i class="fas fa-lock" style="margin-right: 8px;"></i> Password</label>
                <div style="display: flex; gap: 8px; width: 100%;">
                    <input type="password" id="password" name="password" placeholder="••••••••" style="flex: 1; padding: 14px; border: 1.5px solid #eee; border-radius: 10px; font-size: 1rem; background: #fafafa;" required>
                    <button type="button" id="togglePasswordBtn" style="padding: 0 18px; border: 1.5px solid #eee; border-radius: 10px; background: white; cursor: pointer; color: #ff6f61; font-size: 0.85rem; font-weight: 700; transition: all 0.3s; white-space: nowrap;">SHOW</button>
                </div>
                <div style="width: 100%; text-align: right; margin-top: 12px;">
                    <a href="/forgot-password" style="font-size: 0.85rem; color: #ff6f61; text-decoration: none; font-weight: 600; opacity: 0.9;">Forgot password?</a>
                </div>
            </div>
            <button type="submit" class="btn-primary w-100">Sign In</button>
        </form>
        <div class="auth-footer">
            <p>Don't have an account? <a href="/register">Register now</a></p>
        </div>
    </div>
</div>

<script>
const togglePasswordBtn = document.getElementById('togglePasswordBtn');
const password = document.getElementById('password');

togglePasswordBtn.addEventListener('click', function () {
    const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
    password.setAttribute('type', type);
    this.textContent = type === 'password' ? 'SHOW' : 'HIDE';
});

document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const formData = new FormData(e.target);
    const data = Object.fromEntries(formData.entries());
    
    try {
        const res = await fetch('/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        const result = await res.json();
        if (result.success) {
            window.location.href = result.redirect;
        } else {
            alert(result.message);
        }
    } catch (err) {
        console.error(err);
    }
});
</script>
{% endblock %}

{% extends "layout.html" %}
{% block title %}Login | Salon Pro{% endblock %}

{% block content %}
<div class="auth-container" data-aos="zoom-in">
    <div class="auth-card">
        <div class="auth-header">
            <h2>Welcome Back</h2>
            <p>Please enter your details to sign in</p>
        </div>
        <form id="loginForm">
            <div class="form-group">
                <label for="email"><i class="fas fa-envelope"></i> Email Address</label>
                <input type="email" id="email" name="email" placeholder="john@example.com" required>
            </div>
            <div style="margin-bottom: 30px; display: flex; flex-direction: column; width: 100%;">
                <label for="password" style="margin-bottom: 8px; font-weight: 500; color: #333;"><i class="fas fa-lock" style="margin-right: 5px;"></i> Password</label>
                <div style="position: relative; width: 100%;">
                    <input type="password" id="password" name="password" placeholder="••••••••" style="width: 100%; padding: 12px; border: 1.5px solid #eaeaea; border-radius: 10px; font-size: 1rem;" required>
                    <i class="fas fa-eye" id="togglePassword" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #888; font-size: 1.2rem; z-index: 10;"></i>
                </div>
                <div style="width: 100%; text-align: right; margin-top: 10px;">
                    <a href="/forgot-password" id="forgotLink" style="font-size: 0.85rem; color: #ff6f61 !important; text-decoration: none !important; font-weight: 500; display: inline-block;">Forgot password?</a>
                </div>
            </div>
            <button type="submit" class="btn-primary w-100">Sign In</button>
        </form>
        <div class="auth-footer">
            <p>Don't have an account? <a href="/register">Register now</a></p>
        </div>
    </div>
</div>

<script>
const togglePassword = document.getElementById('togglePassword');
const password = document.getElementById('password');

togglePassword.addEventListener('click', function (e) {
    const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
    password.setAttribute('type', type);
    this.classList.toggle('fa-eye-slash');
});

document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const formData = new FormData(e.target);
    const data = Object.fromEntries(formData.entries());
    
    try {
        const res = await fetch('/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        const result = await res.json();
        if (result.success) {
            window.location.href = result.redirect;
        } else {
            alert(result.message);
        }
    } catch (err) {
        console.error(err);
    }
});
</script>
{% endblock %}

{% extends "layout.html" %}
{% block title %}Login | Salon Pro{% endblock %}

{% block content %}
<div class="auth-container" data-aos="zoom-in">
    <div class="auth-card">
        <div class="auth-header">
            <h2>Welcome Back</h2>
            <p>Please enter your details to sign in</p>
        </div>
        <form id="loginForm">
            <div class="form-group">
                <label for="email"><i class="fas fa-envelope"></i> Email Address</label>
                <input type="email" id="email" name="email" placeholder="john@example.com" required>
            </div>
            <div style="margin-bottom: 25px; width: 100%;">
                <label for="password" style="display: block; margin-bottom: 8px; font-weight: 500; color: #333;"><i class="fas fa-lock" style="margin-right: 5px;"></i> Password</label>
                <div style="display: flex; gap: 5px; width: 100%;">
                    <input type="password" id="password" name="password" placeholder="••••••••" style="flex: 1; padding: 12px; border: 1.5px solid #eaeaea; border-radius: 8px; font-size: 1rem;" required>
                    <button type="button" id="togglePasswordBtn" style="padding: 0 15px; border: 1.5px solid #eaeaea; border-radius: 8px; background: white; cursor: pointer; color: #666; font-size: 0.8rem; font-weight: 600;">SHOW</button>
                </div>
                <div style="width: 100%; text-align: right; margin-top: 10px;">
                    <a href="/forgot-password" style="font-size: 0.85rem; color: #ff6f61 !important; text-decoration: none !important; font-weight: 600;">Forgot password?</a>
                </div>
            </div>
            <button type="submit" class="btn-primary w-100">Sign In</button>
        </form>
        <div class="auth-footer">
            <p>Don't have an account? <a href="/register">Register now</a></p>
        </div>
    </div>
</div>

<script>
const togglePasswordBtn = document.getElementById('togglePasswordBtn');
const password = document.getElementById('password');

togglePasswordBtn.addEventListener('click', function () {
    const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
    password.setAttribute('type', type);
    this.textContent = type === 'password' ? 'SHOW' : 'HIDE';
});

document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const formData = new FormData(e.target);
    const data = Object.fromEntries(formData.entries());
    
    try {
        const res = await fetch('/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        const result = await res.json();
        if (result.success) {
            window.location.href = result.redirect;
        } else {
            alert(result.message);
        }
    } catch (err) {
        console.error(err);
    }
});
</script>
{% endblock %}

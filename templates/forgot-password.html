{% extends "layout.html" %}
{% block title %}Forgot Password | Salon Pro{% endblock %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 80vh; padding: 20px;">
    <div class="auth-card" style="width: 100%; max-width: 450px; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); margin: 0 auto;">
        <h2 style="font-family: 'Playfair Display', serif; text-align: center; color: #333; font-size: 2rem; margin-bottom: 10px;">Identify Account</h2>
        <p style="text-align: center; color: #666; margin-bottom: 35px;">Enter your registered email to reset your password</p>
        
        <form id="forgotForm">
            <div style="margin-bottom: 25px;">
                <label style="display: block; margin-bottom: 10px; font-weight: 500; text-align: left;"><i class="fas fa-envelope" style="margin-right: 8px;"></i> Registered Email</label>
                <input type="email" id="email" style="width: 100%; padding: 14px; border: 1.5px solid #eee; border-radius: 10px; font-size: 1rem; background: #fafafa;" placeholder="yourname@gmail.com" required>
            </div>
            <button type="submit" class="btn-primary" style="width: 100%; padding: 14px; border: none; border-radius: 10px; background: #ff6f61; color: white; font-weight: 700; cursor: pointer; font-size: 1rem; transition: transform 0.2s;">Send Reset Link</button>
        </form>
    
    <div style="text-align: center; margin-top: 20px;">
        <a href="/login" style="color: #666; font-size: 0.9rem; text-decoration: none;">Back to Login</a>
    </div>
</div>

<script>
document.getElementById('forgotForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value;
    
    try {
        const res = await fetch('/forgot-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email })
        });
        const result = await res.json();
        if (result.success) {
            alert("Account verified. Redirecting to reset page...");
            window.location.href = result.redirect;
        } else {
            alert(result.message);
        }
    } catch (err) {
        console.error(err);
    }
});
</script>
{% endblock %}

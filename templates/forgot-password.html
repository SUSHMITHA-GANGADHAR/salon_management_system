{% extends "layout.html" %}
{% block title %}Forgot Password | Salon Pro{% endblock %}

{% block content %}
<div class="auth-container" data-aos="zoom-in">
    <div class="auth-card">
        <div class="auth-header">
            <h2>Reset Password</h2>
            <p>Enter your email to receive a one-time reset link</p>
        </div>
        
        <form id="forgotForm">
            <div class="form-group">
                <label for="email"><i class="fas fa-envelope"></i> Registered Email</label>
                <input type="email" id="email" placeholder="yourname@gmail.com" required>
            </div>
            <button type="submit" class="btn-primary w-100">Send Reset Link</button>
        </form>
    
        <div class="auth-footer">
            <a href="/login"><i class="fas fa-arrow-left"></i> Back to Login</a>
        </div>
    </div>
</div>

<script>
document.getElementById('forgotForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value;
    
    try {
        const res = await fetch('/forgot-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email })
        });
        const result = await res.json();
        if (result.success) {
            alert(result.message);
            if (result.debug_link) {
                console.log("Reset link (Dev):", result.debug_link);
            }
        } else {
            alert(result.message);
        }
    } catch (err) {
        console.error(err);
        alert("An error occurred. Please try again.");
    }
});
</script>
{% endblock %}

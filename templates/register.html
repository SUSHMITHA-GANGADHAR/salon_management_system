{% extends "layout.html" %}
{% block title %}Register | Salon Pro{% endblock %}

{% block content %}
<div class="auth-container" data-aos="zoom-in">
    <div class="auth-card">
        <div class="auth-header">
            <h2>Create Account</h2>
            <p>Join our exclusive grooming community</p>
        </div>
        <form id="registerForm">
            <div class="form-group">
                <label for="name"><i class="fas fa-user"></i> Full Name</label>
                <input type="text" id="name" name="name" placeholder="John Doe" required>
            </div>
            <div class="form-group">
                <label for="email"><i class="fas fa-envelope"></i> Email Address</label>
                <input type="email" id="email" name="email" placeholder="john@example.com" required>
            </div>
            <div class="form-group">
                <label><i class="fas fa-venus-mars"></i> Preferred Salon Type</label>
                <div style="display: flex; gap: 1rem; margin-top: 0.5rem;">
                    <label style="flex: 1; padding: 1rem; border: 1.5px solid #eee; border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 0.5rem;">
                        <input type="radio" name="gender" value="male" checked> Male Grooming
                    </label>
                    <label style="flex: 1; padding: 1rem; border: 1.5px solid #eee; border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 0.5rem;">
                        <input type="radio" name="gender" value="female"> Female Salon
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label><i class="fas fa-lock"></i> Password</label>
                <div style="position: relative;">
                    <input type="password" id="password" name="password" placeholder="••••••••" style="width: 100%;" required>
                    <i class="fas fa-eye" id="togglePassword" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text-muted);"></i>
                </div>
            </div>
            <div class="form-group">
                <label for="role"><i class="fas fa-user-tag"></i> Role</label>
                <select id="role" name="role">
                    <option value="customer">Customer</option>
                    <option value="staff">Staff</option>
                </select>
            </div>
            <button type="submit" class="btn-primary w-100">Sign Up</button>
        </form>
        <div class="auth-footer">
            <p>Already have an account? <a href="/login">Login here</a></p>
        </div>
    </div>
</div>

<script>
const togglePassword = document.getElementById('togglePassword');
const password = document.getElementById('password');

togglePassword.addEventListener('click', function (e) {
    const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
    password.setAttribute('type', type);
    this.classList.toggle('fa-eye-slash');
});

document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const formData = new FormData(e.target);
    const data = Object.fromEntries(formData.entries());
    const gender = document.querySelector('input[name="gender"]:checked').value;
    data.gender = gender;
    
    try {
        const res = await fetch('/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        const result = await res.json();
        if (result.success) {
            alert(result.message);
            window.location.href = result.redirect;
        } else {
            alert(result.message);
        }
    } catch (err) {
        console.error(err);
    }
});
</script>
{% endblock %}

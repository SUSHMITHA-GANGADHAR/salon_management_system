{% extends "layout.html" %}
{% block title %}Register | Salon Pro{% endblock %}

{% block content %}
<div class="auth-container" data-aos="zoom-in">
    <div class="auth-card">
        <div class="auth-header">
            <h2>Create Account</h2>
            <p>Join our exclusive grooming community</p>
        </div>
        <form id="registerForm">
            <div class="form-group">
                <label for="name"><i class="fas fa-user"></i> Full Name</label>
                <input type="text" id="name" name="name" placeholder="John Doe" required>
            </div>
            <div class="form-group">
                <label for="email"><i class="fas fa-envelope"></i> Email Address</label>
                <input type="email" id="email" name="email" placeholder="john@example.com" required>
            </div>
            <div class="form-group">
                <label><i class="fas fa-venus-mars"></i> Preferred Salon Type</label>
                <div style="display: flex; gap: 1rem; margin-top: 0.5rem;">
                    <label style="flex: 1; padding: 1rem; border: 1.5px solid #eee; border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 0.5rem;">
                        <input type="radio" name="gender" value="male" checked> Male Grooming
                    </label>
                    <label style="flex: 1; padding: 1rem; border: 1.5px solid #eee; border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 0.5rem;">
                        <input type="radio" name="gender" value="female"> Female Salon
                    </label>
                </div>
            </div>

            <div style="margin-bottom: 25px; display: flex; flex-direction: column; width: 100%;">
                <label style="margin-bottom: 8px; font-weight: 500; color: #333;"><i class="fas fa-lock" style="margin-right: 5px;"></i> Password</label>
                <div style="display: flex; gap: 8px; width: 100%;">
                    <input type="password" id="password" name="password" placeholder="••••••••" style="flex: 1; padding: 12px; border: 1.5px solid #eaeaea; border-radius: 10px; font-size: 1rem;" required>
                    <button type="button" id="togglePasswordBtn" style="padding: 0 15px; border: 1.5px solid #eaeaea; border-radius: 8px; background: white; cursor: pointer; color: #ff6f61; font-size: 0.8rem; font-weight: 700;">SHOW</button>
                </div>
            </div>
            <div class="form-group">
                <label for="role"><i class="fas fa-user-tag"></i> Role</label>
                <select id="role" name="role">
                    <option value="customer">Customer</option>
                    <option value="staff">Staff</option>
                </select>
            </div>
            <button type="submit" class="btn-primary w-100">Sign Up</button>
        </form>
        <div class="auth-footer">
            <p>Already have an account? <a href="/login">Login here</a></p>
        </div>
    </div>
</div>

<script>
const togglePasswordBtn = document.getElementById('togglePasswordBtn');
const password = document.getElementById('password');

togglePasswordBtn.addEventListener('click', function () {
    const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
    password.setAttribute('type', type);
    this.textContent = type === 'password' ? 'SHOW' : 'HIDE';
});

document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const formData = new FormData(e.target);
    const data = Object.fromEntries(formData.entries());
    const gender = document.querySelector('input[name="gender"]:checked').value;
    data.gender = gender;
    
    try {
        const res = await fetch('/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        const result = await res.json();
        if (result.success) {
            alert(result.message || "Registration successful!");
            window.location.href = result.redirect || '/login';
        } else {
            alert(result.message || "Registration failed. Please check your details.");
        }
    } catch (err) {
        console.error(err);
    }
});
</script>
{% endblock %}

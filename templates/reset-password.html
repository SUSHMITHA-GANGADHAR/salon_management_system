{% extends "layout.html" %}
{% block title %}Reset Password | Salon Pro{% endblock %}

{% block content %}
<div class="auth-container" style="max-width: 500px; margin: 50px auto; padding: 30px; background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);">
    <h2 style="font-family: 'Playfair Display', serif; text-align: center; color: #333;">Set New Password</h2>
    <p style="text-align: center; color: #666; margin-bottom: 30px;">Resetting password for: <strong id="userEmail">{{ email }}</strong></p>
    
    <form id="resetForm">
        <input type="hidden" id="email" value="{{ email }}">
        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px; font-weight: 500;">New Password</label>
            <input type="password" id="new_password" style="width: 100%; padding: 12px; border: 1.5px solid #eaeaea; border-radius: 8px;" placeholder="••••••••" required>
        </div>
        <div style="margin-bottom: 25px;">
            <label style="display: block; margin-bottom: 8px; font-weight: 500;">Confirm New Password</label>
            <input type="password" id="confirm_password" style="width: 100%; padding: 12px; border: 1.5px solid #eaeaea; border-radius: 8px;" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-primary" style="width: 100%; padding: 12px; border: none; border-radius: 8px; background: #ff6f61; color: white; font-weight: 600; cursor: pointer;">Update Password</button>
    </form>
</div>

<script>
document.getElementById('resetForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const new_password = document.getElementById('new_password').value;
    const confirm_password = document.getElementById('confirm_password').value;
    
    if (new_password !== confirm_password) {
        alert("Passwords do not match!");
        return;
    }
    
    try {
        const res = await fetch('/reset-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, new_password, confirm_password })
        });
        const result = await res.json();
        if (result.success) {
            alert(result.message);
            window.location.href = result.redirect;
        } else {
            alert(result.message);
        }
    } catch (err) {
        console.error(err);
    }
});
</script>
{% endblock %}

{% extends "layout.html" %}
{% block title %}Reset Password | Salon Pro{% endblock %}

{% block content %}
<div class="auth-container" data-aos="zoom-in">
    <div class="auth-card">
        <div class="auth-header">
            <h2>Set New Password</h2>
            <p>Enter your new credentials below</p>
        </div>
        
        <form id="resetForm">
            <input type="hidden" id="token" value="{{ token }}">
            <div class="form-group">
                <label for="new_password"><i class="fas fa-lock"></i> New Password</label>
                <input type="password" id="new_password" placeholder="••••••••" required>
            </div>
            <div class="form-group">
                <label for="confirm_password"><i class="fas fa-check-double"></i> Confirm Password</label>
                <input type="password" id="confirm_password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-primary w-100">Update Password</button>
        </form>

        <div class="auth-footer">
            <a href="/login">Back to Login</a>
        </div>
    </div>
</div>

<script>
document.getElementById('resetForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const token = document.getElementById('token').value;
    const new_password = document.getElementById('new_password').value;
    const confirm_password = document.getElementById('confirm_password').value;
    
    if (new_password !== confirm_password) {
        alert("Passwords do not match!");
        return;
    }
    
    try {
        const res = await fetch('/reset-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token, new_password, confirm_password })
        });
        const result = await res.json();
        if (result.success) {
            alert(result.message);
            if (result.debug_link) {
                console.log("Reset Link (Dev):", result.debug_link);
            }
            window.location.href = result.redirect;
        } else {
            alert(result.message);
        }
    } catch (err) {
        console.error(err);
        alert("An error occurred. Please try again.");
    }
});
</script>
{% endblock %}
